{{define "content"}}
<section class="max-w-[720px] mx-auto px-6 py-16">
    <div class="mb-8 animate-up">
        <h1 class="font-serif text-3xl font-medium mb-2" style="color: var(--text);">Tags</h1>
    </div>

    <div class="flex flex-wrap gap-2 animate-up stagger-1">
        {{range .Tags}}
        <a href="/tags/{{.Name}}" class="tag" style="padding: 6px 14px; font-size: 0.9rem;">
            {{.Name}} <span style="color: var(--text-dim);">{{.Count}}</span>
        </a>
        {{end}}
    </div>
</section>
{{end}}
