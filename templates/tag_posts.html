{{define "content"}}
<section class="max-w-[720px] mx-auto px-6 py-16">
    <div class="mb-8 animate-up">
        <a href="/tags" class="inline-flex items-center gap-1 text-sm mb-4 block" style="color: var(--text-dim);">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            All tags
        </a>
        <h1 class="font-serif text-3xl font-medium" style="color: var(--text);">
            Posts tagged <em style="color: var(--accent);">{{.Tag}}</em>
        </h1>
        <p class="text-sm mt-1 mb-0" style="color: var(--text-dim);">{{len .Blogs}} posts</p>
    </div>

    <div class="animate-up stagger-1">
        {{range .Blogs}}
        <article class="post-item">
            <a href="/blog/{{.Slug}}" class="block group">
                <div class="flex flex-col sm:flex-row sm:items-baseline sm:justify-between gap-1 mb-1">
                    <h2 class="post-item__title group-hover:underline">{{.Title}}</h2>
                    <div class="post-item__meta flex-shrink-0">
                        <time>{{.Date.Format "Jan 2, 2006"}}</time>
                        <span class="mx-1">&middot;</span>
                        <span>{{.ReadingTime}} min</span>
                    </div>
                </div>
                <p class="post-item__desc mb-0">{{.Description}}</p>
            </a>
            <div class="flex flex-wrap gap-1.5 mt-2">
                {{range .Tags}}
                <a href="/tags/{{.}}" class="tag">{{.}}</a>
                {{end}}
            </div>
        </article>
        {{end}}
    </div>
</section>
{{end}}
