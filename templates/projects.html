{{define "content"}}
<section class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
    <!-- Heading -->
    <h1 class="text-4xl font-bold text-[#EDEDED] mb-10">Projects</h1>

    <!-- Project Cards Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {{range .Projects}}
        <div class="p-6 bg-[#141414] border border-[#1F1F1F] rounded-lg hover:border-[#333] transition-colors duration-200">
            <div class="flex items-start justify-between mb-3">
                <h2 class="text-xl font-semibold text-[#EDEDED]">{{.Title}}</h2>
                <div class="flex gap-3 flex-shrink-0 ml-4">
                    {{if .GithubLink}}
                    <a href="{{.GithubLink}}" target="_blank" rel="noopener noreferrer" class="text-[#8A8F98] hover:text-[#EDEDED] transition-colors duration-200" title="GitHub">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </a>
                    {{end}}
                    {{if .DemoLink}}
                    <a href="{{.DemoLink}}" target="_blank" rel="noopener noreferrer" class="text-[#8A8F98] hover:text-[#EDEDED] transition-colors duration-200" title="Live Demo">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                        </svg>
                    </a>
                    {{end}}
                </div>
            </div>
            <p class="text-sm text-[#8A8F98] mb-4 leading-relaxed">{{.Description}}</p>
            <div class="flex flex-wrap gap-2">
                {{range .TechStack}}
                <span class="px-2 py-1 text-xs font-medium text-[#8A8F98] bg-[#0A0A0A] border border-[#1F1F1F] rounded">{{.}}</span>
                {{end}}
            </div>
        </div>
        {{end}}
    </div>
</section>
{{end}}
