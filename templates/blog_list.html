{{define "content"}}
<section class="max-w-[720px] mx-auto px-6 py-16">
    <!-- Heading -->
    <div class="mb-8 animate-up">
        <h1 class="font-serif text-3xl font-medium mb-2" style="color: var(--text);">Blog</h1>
        <p class="text-sm mb-0" style="color: var(--text-dim);">{{len .Blogs}} posts published</p>
    </div>

    <!-- Tag Filter -->
    {{if .Tags}}
    <div class="flex flex-wrap gap-2 mb-8 animate-up stagger-1">
        {{range .Tags}}
        <a href="/tags/{{.Name}}" class="tag">
            {{.Name}} <span style="color: var(--text-dim);">{{.Count}}</span>
        </a>
        {{end}}
    </div>
    {{end}}

    <!-- Blog Post List -->
    <div class="animate-up stagger-2">
        {{range .Blogs}}
        <article class="post-item">
            <a href="/blog/{{.Slug}}" class="block group">
                <div class="flex flex-col sm:flex-row sm:items-baseline sm:justify-between gap-1 mb-1">
                    <h2 class="post-item__title group-hover:underline">{{.Title}}</h2>
                    <div class="post-item__meta flex-shrink-0">
                        <time>{{.Date.Format "Jan 2, 2006"}}</time>
                        <span class="mx-1">&middot;</span>
                        <span>{{.ReadingTime}} min</span>
                    </div>
                </div>
                <p class="post-item__desc mb-0">{{.Description}}</p>
            </a>
            <div class="flex flex-wrap gap-1.5 mt-2">
                {{range .Tags}}
                <a href="/tags/{{.}}" class="tag">{{.}}</a>
                {{end}}
            </div>
        </article>
        {{end}}
    </div>
</section>
{{end}}
